name: Keep App Awake

on:
  schedule:
    # This runs every 24 hours (at 00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: curl -I https://miscellaneousapp-python.streamlit.app/ -L
